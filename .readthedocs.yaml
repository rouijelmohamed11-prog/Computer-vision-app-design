# .readthedocs.yaml
# Read the Docs build configuration for VisionStudioAI
# Documentation: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

# ─────────────────────────────────────────────
#  BUILD ENVIRONMENT
# ─────────────────────────────────────────────
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    # Cache pip dependencies between builds
    post_create_environment:
      - pip install --upgrade pip
    # Build the docs
    post_install:
      - pip install --upgrade pip setuptools wheel

# ─────────────────────────────────────────────
#  MKDOCS
# ─────────────────────────────────────────────
mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

# ─────────────────────────────────────────────
#  PYTHON DEPENDENCIES
# ─────────────────────────────────────────────
python:
  install:
    - requirements: requirements.txt

# ─────────────────────────────────────────────
#  SUBMODULES (if any)
# ─────────────────────────────────────────────
# submodules:
#   include: all
#   recursive: true
